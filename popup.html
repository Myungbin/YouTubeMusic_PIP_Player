<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Music PIP</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z" />
          </svg>
        </div>
        <div class="header-copy">
          <p class="eyebrow">YouTube Music</p>
          <h1>YouTube Music PIP</h1>
        </div>
      </header>

      <div id="errorBanner" class="banner hidden" role="alert"></div>

      <section id="statusCard" class="status-panel" aria-live="polite">
        <div class="status-head">
          <span class="status-label">상태</span>
          <div class="status-indicator">
            <span id="statusDot" class="status-dot inactive"></span>
            <span id="statusText">탭 확인 중</span>
          </div>
        </div>
        <p id="statusSubtext" class="status-subtext">
          활성 탭과 PIP 상태를 확인하고 있습니다.
        </p>
        <div id="capabilityRow" class="capability-row hidden" aria-label="PIP 지원 상태">
          <span id="documentSupport" class="capability">Document PiP</span>
          <span id="videoSupport" class="capability">Video PiP</span>
        </div>
      </section>

      <div class="actions">
        <button id="pipButton" class="pip-button" type="button">
          <span class="button-icon" aria-hidden="true">
            <svg id="pipButtonIcon" viewBox="0 0 24 24">
              <path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14z" />
            </svg>
          </span>
          <span id="pipButtonText">PIP 시작</span>
        </button>

        <button id="openButton" class="secondary-button hidden" type="button">
          <span class="button-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3z"></path>
              <path d="M5 5h6v2H5v12h12v-6h2v6c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V7c0-1.1.9-2 2-2z"></path>
            </svg>
          </span>
          <span>YouTube Music 열기</span>
        </button>
      </div>

      <div id="quickStatus" class="quick-status" aria-hidden="true">
        <span class="quick-dot"></span>
        <span id="footerNote">재생 중인 YouTube Music 탭에서 사용할 수 있어요.</span>
      </div>
    </div>

    <script src="helpers.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
